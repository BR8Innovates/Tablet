name: Build Android APK

on:
  push:
    branches:
      - main
      - claude/health-tracking-apk-skxaa7
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets
        run: ./scripts/prepare-www.sh

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Generate Android launcher icons
        run: ./scripts/generate-android-icons.sh

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitals-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Publish/update Release with APK
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: android-latest
          name: Vitals Android APK (latest)
          body: |
            Auto-built debug APK of the Vitals health tracker, from commit ${{ github.sha }}.

            Download `app-debug.apk` below, enable "Install unknown apps" for the
            app you use to open it (browser or file manager), then install.
            See the README for full sideloading instructions.
          files: android/app/build/outputs/apk/debug/app-debug.apk
